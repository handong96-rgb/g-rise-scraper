name: Auto Scraper KST Midnight

on:
  schedule:
    - cron: '0 15 * * *' # 매일 한국 시간 자정
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필요 패키지 설치
        run: |
          pip install -r requirements.txt

      - name: 1. 가족회사 수집 (main.py 실행)
        run: |
          python main.py

      - name: 2. 명품강소기업 수집 (prestige_scraper.py 실행)
        run: |
          python prestige_scraper.py

      - name: 변경된 데이터(모든 CSV)를 GitHub에 저장
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 방금 생성된 CSV 파일들을 깃허브 가상 공간에 먼저 안전하게 저장(Commit)합니다.
          git add *.csv
          git commit -m "Auto-update all data KST Midnight" || echo "No changes to commit"
          
          # 2. 깃허브 서버의 최신 상태를 가져옵니다. 
          # (-X theirs: 충돌이 발생하면 방금 우리가 수집한 새 CSV 파일을 우선순위로 둡니다.)
          git pull --rebase -X theirs origin main
          
          # 3. 최종적으로 깃허브 저장소에 밀어 넣습니다(Push).
          git push
