name: Auto Scraper KST Midnight

on:
  schedule:
    # 한국 시간(KST) 자정은 UTC 기준으로 오후 3시(15:00)입니다.
    - cron: '0 15 * * *'
  workflow_dispatch: # 수동으로 버튼을 눌러서 실행할 수 있게 해주는 옵션

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 봇이 파일을 덮어쓸 수 있도록 권한 부여

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필요 패키지 설치
        run: |
          pip install -r requirements.txt

      - name: 스크래핑 파이썬 코드 실행
        run: |
          python main.py

      - name: 변경된 데이터(CSV)를 GitHub에 저장(Commit & Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add G_RISE_기업목록.csv
          git commit -m "Auto-update data KST Midnight" || echo "No changes to commit"
          git push
